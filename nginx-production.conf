events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream session_manager {
        server jarvis-session-manager:9000;
    }

    # Extract session ID from Referer header when requests come from session pages
    # This handles absolute-path fetch() calls like /get-generators, /destinations, etc.
    map $http_referer $referer_session_id {
        default "";
        "~*/session/([^/]+)/frontend" $1;
    }

    server {
        listen 80;
        server_name jarvis.roarinpenguin.com helios.roarinpenguin.com;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Session Manager API proxy
        location /api/ {
            proxy_pass http://session_manager/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Admin panel
        location /admin {
            alias /usr/share/nginx/admin;
            try_files $uri $uri/ /index.html;
        }

        # Session routing - Frontend (explicit path)
        location ~ ^/session/([^/]+)/frontend(.*)$ {
            set $session_id $1;
            set $path $2;

            resolver 127.0.0.11 valid=30s;
            set $target jarvis-$session_id-frontend;

            proxy_pass http://$target:8000$path$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Session routing - Backend (explicit path)
        location ~ ^/session/([^/]+)/backend(.*)$ {
            set $session_id $1;
            set $path $2;

            resolver 127.0.0.11 valid=30s;
            set $target jarvis-$session_id-backend;

            proxy_pass http://$target:8000$path$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Landing page OR session frontend routing based on Referer
        # When fetch() calls use absolute paths like /get-generators from a session page,
        # the Referer header contains the session ID — route to that session's container
        location / {
            # If the request has a session Referer, proxy to that session's frontend
            if ($referer_session_id) {
                rewrite ^(.*)$ /session/$referer_session_id/frontend$1 last;
            }

            # Otherwise serve the landing page
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
